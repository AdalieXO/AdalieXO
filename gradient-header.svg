<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 340 130"
  width="100%"
>
  <defs>
    <linearGradient
      id="animatedGradient"
      gradientUnits="userSpaceOnUse"
      x1="0"
      y1="0"
      x2="900"
      y2="0"
    >
      <stop offset="0%" stop-color="#ff7adf" />
      <stop offset="25%" stop-color="#7aa2ff" />
      <stop offset="50%" stop-color="#4fdfff" />
      <stop offset="75%" stop-color="#7aa2ff" />
      <stop offset="100%" stop-color="#ff7adf" />

      <animateTransform
        attributeName="gradientTransform"
        type="translate"
        from="-900 0"
        to="900 0"
        dur="5s"
        repeatCount="indefinite"
      />
    </linearGradient>
  </defs>

  <text
    x="50%"
    y="55%"
    text-anchor="middle"
    dominant-baseline="middle"
    font-size="52"
    font-family="monospace"
    fill="url(#animatedGradient)"
  >
    𑣲┆𝙰𝚍𝚊𝚕𝚒𝚎˚.⋆ֹ
  </text>
</svg>
